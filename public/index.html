<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小票报销Word生成工具</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>小票报销Word生成工具</h1>
      <p class="subtitle">上传PDF小票 → AI自动识别 → 生成报销Word</p>
    </header>

    <div id="api-status" class="api-status hidden">
      <span class="status-dot"></span>
      <span id="api-status-text">检查API配置中...</span>
    </div>

    <section class="upload-section">
      <div class="upload-area" id="upload-area">
        <div class="upload-icon">+</div>
        <p class="upload-text">点击或拖拽PDF小票到此处上传</p>
        <p class="upload-hint">支持多张同时上传，每张PDF应为单张小票</p>
        <input type="file" id="file-input" accept=".pdf,application/pdf" multiple hidden>
      </div>
    </section>

    <section id="files-section" class="files-section hidden">
      <h2>上传文件 <span id="file-count">(0)</span></h2>
      <div id="file-list" class="file-list"></div>
    </section>

    <section id="results-section" class="results-section hidden">
      <h2>识别结果 <span class="hint">（可直接编辑修改）</span></h2>
      <div id="results-list" class="results-list"></div>
    </section>

    <section id="actions-section" class="actions-section hidden">
      <button id="generate-btn" class="btn btn-primary" disabled>
        生成报销Word
      </button>
      <p id="generate-hint" class="action-hint">正在识别中，请稍候...</p>
    </section>
  </div>

  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="spinner"></div>
    <p id="loading-text">正在处理...</p>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
